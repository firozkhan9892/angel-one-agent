<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magice To-Do List</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding-top: 50px;
        }

        h1 {
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .todo-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
            outline: none;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button#add-btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #ff4da6;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button#add-btn:hover {
            background: #ff007b;
            transform: scale(1.05);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        li:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .task-text {
            cursor: pointer;
            flex: 1;
        }

        .completed .task-text {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.4);
        }

        .delete-btn {
            background: rgba(244, 67, 54, 0.6);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: rgba(244, 67, 54, 0.9);
        }
    </style>
</head>
<body>

    <h1>Magice To-Do List</h1>

    <div class="todo-container">
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="Add a magical task...">
            <button id="add-btn">Add</button>
        </div>
        <ul id="todo-list"></ul>
    </div>

    <script>
        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');

        // Load tasks from localStorage on startup
        document.addEventListener('DOMContentLoaded', loadTasks);

        function addTask(text = null, completed = false) {
            const taskText = typeof text === 'string' ? text : input.value.trim();
            if (taskText === "") return;

            const li = document.createElement('li');
            if (completed) li.classList.add('completed');

            li.innerHTML = `
                <span class="task-text">${taskText}</span>
                <button class="delete-btn">Delete</button>
            `;

            // Toggle complete
            li.querySelector('.task-text').addEventListener('click', () => {
                li.classList.toggle('completed');
                saveTasks();
            });

            // Delete task
            li.querySelector('.delete-btn').addEventListener('click', () => {
                li.remove();
                saveTasks();
            });

            todoList.appendChild(li);
            if (typeof text !== 'string') {
                input.value = "";
                saveTasks();
            }
        }

        function saveTasks() {
            const tasks = [];
            document.querySelectorAll('li').forEach(li => {
                tasks.push({
                    text: li.querySelector('.task-text').innerText,
                    completed: li.classList.contains('completed')
                });
            });
            localStorage.setItem('magical-tasks', JSON.stringify(tasks));
        }

        function loadTasks() {
            const savedTasks = JSON.parse(localStorage.getItem('magical-tasks')) || [];
            savedTasks.forEach(task => addTask(task.text, task.completed));
        }

        addBtn.addEventListener('click', addTask);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
