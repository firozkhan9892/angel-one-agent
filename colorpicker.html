<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magice Color Picker</title>
    <style>
        :root {
            --bg-color: #0f172a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            transition: background-color 0.5s ease;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .picker-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 320px;
        }

        .color-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 25px;
            border: 5px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .color-preview:hover {
            transform: scale(1.1);
        }

        .hex-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .hex-display::after {
            content: 'Click to Copy';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 15px 25px;
            border-radius: 15px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .magic-btn {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .magic-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .input-btn {
            background: white;
            color: #333;
        }

        #color-input {
            opacity: 0;
            position: absolute;
            z-index: -1;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            background: #10b981;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            transform: translateY(100px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .toast.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>Magice Color Picker</h1>

    <div class="picker-card">
        <div class="color-preview" id="preview"></div>
        <div class="hex-display" id="hex-text">#0F172A</div>

        <div class="controls">
            <button class="magic-btn" id="generate-btn">Magic Random Color</button>
            <label for="color-input" class="input-btn" style="padding: 15px 25px; border-radius: 15px; cursor: pointer; display: inline-block;">
                Choose Custom Color
            </label>
            <input type="color" id="color-input">
        </div>
    </div>

    <div class="toast" id="toast">Copied to Clipboard!</div>

    <script>
        const preview = document.getElementById('preview');
        const hexText = document.getElementById('hex-text');
        const generateBtn = document.getElementById('generate-btn');
        const colorInput = document.getElementById('color-input');
        const toast = document.getElementById('toast');

        function updateColor(color) {
            color = color.toUpperCase();
            preview.style.backgroundColor = color;
            hexText.innerText = color;
            document.body.style.backgroundColor = color;

            // Adjust text color based on brightness
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;

            document.body.style.color = brightness > 125 ? '#1e293b' : 'white';
        }

        function generateRandomColor() {
            const chars = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += chars[Math.floor(Math.random() * 16)];
            }
            updateColor(color);
        }

        function copyToClipboard() {
            const text = hexText.innerText;
            navigator.clipboard.writeText(text).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        generateBtn.addEventListener('click', generateRandomColor);

        colorInput.addEventListener('input', (e) => {
            updateColor(e.target.value);
        });

        hexText.addEventListener('click', copyToClipboard);

        // Initial color
        updateColor('#0F172A');
    </script>
</body>
</html>
